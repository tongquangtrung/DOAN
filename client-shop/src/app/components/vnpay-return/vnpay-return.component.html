<div class="ps-page--simple">
    <div class="ps-section--shopping pt-40 pb-40">
        <div class="container">
            <div class="ps-section__content">
                <div class="card p-5 text-center">
                    <ng-container *ngIf="isLoading">
                        <i class="fa fa-spinner fa-spin fa-3x fa-fw text-primary"></i>
                        <h2 class="mt-3">{{ status }}</h2>
                        <p>{{ message }}</p>
                    </ng-container>

                    <ng-container *ngIf="!isLoading">
                        <i *ngIf="isSuccess" class="fa fa-check-circle fa-5x text-success"></i>
                        <i *ngIf="!isSuccess" class="fa fa-times-circle fa-5x text-danger"></i>
                        
                        <h2 class="mt-3" [ngClass]="{'text-success': isSuccess, 'text-danger': !isSuccess}">
                            {{ status }}
                        </h2>
                        <p>{{ message }}</p>

                        <div class="mt-4 text-left p-3 border rounded" *ngIf="transactionId">
                            <h4>Thông tin giao dịch:</h4>
                            <p><strong>Thông tin Đơn hàng:</strong> {{ orderInfo }}</p>
                            <p><strong>Tổng tiền:</strong> <span style="font-weight: bold; color: red;">{{ totalPrice }}</span></p>
                            <p><strong>Mã Giao dịch VNPAY:</strong> {{ transactionId }}</p>
                        </div>
                        
                        <a class="ps-btn mt-4" [routerLink]="['/home']">
                            <i class="fa fa-home"></i> Về Trang chủ
                        </a>
                        <a class="ps-btn mt-4" [routerLink]="['/profile']">
                            <i class="fa fa-list"></i> Xem Lịch sử Đơn hàng
                        </a>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>
</div>
