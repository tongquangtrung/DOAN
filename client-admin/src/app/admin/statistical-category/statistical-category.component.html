<div class="container-fluid">
  <div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">Phân tích loại hàng bán chạy</h1>
    <button
      class="btn btn-sm btn-primary shadow-sm"
      (click)="getCategoryBestSeller()"
    >
      <i class="fas fa-sync fa-sm text-white-50"></i> Làm mới dữ liệu
    </button>
  </div>

  <div class="row">
    <div class="col-xl-7 col-lg-6">
      <div class="card shadow mb-4">
        <div class="card-header py-3">
          <h6 class="m-0 font-weight-bold text-primary">Danh sách chi tiết</h6>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table mat-table [dataSource]="listData" matSort class="w-100">
              <ng-container matColumnDef="index">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>STT</th>
                <td mat-cell *matCellDef="let row; let i = index">
                  {{ i + 1 }}
                </td>
              </ng-container>

              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                  Tên loại hàng
                </th>
                <td mat-cell *matCellDef="let row" class="font-weight-bold">
                  {{ row.name }}
                </td>
              </ng-container>

              <ng-container matColumnDef="count">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                  Đã bán
                </th>
                <td mat-cell *matCellDef="let row">
                  <span class="badge badge-info">{{ row.count }} sản phẩm</span>
                </td>
              </ng-container>

              <ng-container matColumnDef="amount">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                  Doanh thu
                </th>
                <td
                  mat-cell
                  *matCellDef="let row"
                  class="text-success font-weight-bold"
                >
                  {{ row.amount | currency : "VND" }}
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="columns"></tr>
              <tr mat-row *matRowDef="let row; columns: columns"></tr>
            </table>

            <mat-paginator
              [length]="lengthCategoryBestSeller"
              [pageSize]="10"
              [pageSizeOptions]="[5, 10, 20]"
              showFirstLastButtons
            >
            </mat-paginator>
          </div>
        </div>
      </div>
    </div>

    <div class="col-xl-5 col-lg-6">
      <div class="card shadow mb-4">
        <div class="card-header py-3">
          <h6 class="m-0 font-weight-bold text-primary">Tỉ trọng doanh thu</h6>
        </div>
        <div class="card-body">
          <div
            class="chart-container"
            style="position: relative; height: 40vh; width: 100%"
          >
            <canvas id="charCategory"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
